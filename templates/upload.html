<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Airbus Canvas - Digitize Procedure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fa; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-in { animation: slideIn 0.4s ease-out forwards; opacity: 0; transform: translateX(-20px); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }
        /* Loader Spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="bg-gradient-to-r from-[#00205B] to-[#003882] text-white pt-8 pb-16 px-6 shadow-lg">
        <div class="max-w-4xl mx-auto">
            <a href="/" class="inline-flex items-center gap-2 text-blue-200 hover:text-white font-bold text-xs uppercase tracking-widest mb-6 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Library
            </a>
            <div class="flex items-center gap-4">
                <div class="bg-white/10 p-3 rounded-xl backdrop-blur-sm border border-white/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                </div>
                <h1 class="text-3xl font-black tracking-tight drop-shadow-sm">Procedure Digitization Wizard</h1>
            </div>
            <p class="text-blue-100 font-medium mt-3 ml-16">Select document type and upload your PDF. Vertex AI will extract the data automatically.</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto w-full px-6 -mt-8 flex-1 pb-12 z-10 relative">
        
        <form action="/generate_from_pdf" method="post" enctype="multipart/form-data" id="upload-form" onsubmit="showLoadingState()">
            <input type="hidden" name="doc_type" id="hidden-doc-type" value="">

            <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100 mb-6 slide-in" style="animation-delay: 0.1s;">
                <div class="flex items-center gap-3 mb-6">
                    <span class="bg-[#00205B] text-white w-8 h-8 rounded-full flex items-center justify-center font-black text-sm shadow-md">1</span>
                    <h2 class="text-lg font-black text-slate-800 tracking-tight">Select Document Type</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 ml-11">
                    <label class="cursor-pointer group">
                        <input type="radio" name="mainCat" value="procedure" class="peer sr-only" onchange="handleMainCatChange()">
                        <div class="p-5 rounded-xl border-2 border-slate-200 peer-checked:border-[#00205B] peer-checked:bg-blue-50 group-hover:border-[#00205B] transition-all text-center">
                            <div class="font-black text-slate-700 peer-checked:text-[#00205B] mb-1">Procedure</div>
                            <div class="text-[10px] text-slate-400 uppercase font-bold">Standard PDF</div>
                        </div>
                    </label>
                    <label class="cursor-pointer group">
                        <input type="radio" name="mainCat" value="method" class="peer sr-only" onchange="handleMainCatChange()">
                        <div class="p-5 rounded-xl border-2 border-slate-200 peer-checked:border-[#00205B] peer-checked:bg-blue-50 group-hover:border-[#00205B] transition-all text-center">
                            <div class="font-black text-slate-700 peer-checked:text-[#00205B] mb-1">Method</div>
                            <div class="text-[10px] text-slate-400 uppercase font-bold">M-Codes & Guidelines</div>
                        </div>
                    </label>
                    <label class="cursor-pointer group">
                        <input type="radio" name="mainCat" value="manual" class="peer sr-only" onchange="handleMainCatChange()">
                        <div class="p-5 rounded-xl border-2 border-slate-200 peer-checked:border-[#00205B] peer-checked:bg-blue-50 group-hover:border-[#00205B] transition-all text-center">
                            <div class="font-black text-slate-700 peer-checked:text-[#00205B] mb-1">Manual</div>
                            <div class="text-[10px] text-slate-400 uppercase font-bold">FM-Codes & Tutorials</div>
                        </div>
                    </label>
                </div>
            </div>

            <div id="subtype-section" class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100 mb-6 hidden slide-in" style="animation-delay: 0.2s;">
                <div class="flex items-center gap-3 mb-6">
                    <span class="bg-[#00205B] text-white w-8 h-8 rounded-full flex items-center justify-center font-black text-sm shadow-md">2</span>
                    <h2 class="text-lg font-black text-slate-800 tracking-tight">Select Architecture Subtype</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 ml-11">
                    <label class="cursor-pointer group">
                        <input type="radio" name="subType" value="operational" class="peer sr-only" onchange="handleSubTypeChange('operational')">
                        <div class="p-6 rounded-xl border-2 border-slate-200 peer-checked:border-emerald-500 peer-checked:bg-emerald-50 group-hover:border-emerald-400 transition-all relative overflow-hidden">
                            <div class="font-black text-lg text-slate-800 peer-checked:text-emerald-700 mb-2 relative z-10">Operational Procedure</div>
                            <div class="text-xs text-slate-500 font-medium relative z-10">Detailed tasks, a "Flowchart of Activities", and granular steps.</div>
                        </div>
                    </label>
                    <label class="cursor-pointer group">
                        <input type="radio" name="subType" value="framework" class="peer sr-only" onchange="handleSubTypeChange('framework')">
                        <div class="p-6 rounded-xl border-2 border-slate-200 peer-checked:border-purple-500 peer-checked:bg-purple-50 group-hover:border-purple-400 transition-all relative overflow-hidden">
                            <div class="font-black text-lg text-slate-800 peer-checked:text-purple-700 mb-2 relative z-10">Framework & Governance</div>
                            <div class="text-xs text-slate-500 font-medium relative z-10">Process maps, sub-processes lists, and high-level architecture.</div>
                        </div>
                    </label>
                </div>
            </div>

            <div id="upload-section" class="bg-white p-8 rounded-2xl shadow-xl border-t-4 border-emerald-500 hidden slide-in" style="animation-delay: 0.3s;">
                <div class="flex items-center gap-3 mb-6">
                    <span id="step-number" class="bg-emerald-500 text-white w-8 h-8 rounded-full flex items-center justify-center font-black text-sm shadow-md">3</span>
                    <h2 class="text-lg font-black text-slate-800 tracking-tight">Upload PDF & Generate</h2>
                </div>
                
                <div class="ml-11 space-y-5">
                    <div class="flex items-center justify-center w-full">
                        <label for="pdf-upload" class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <svg class="w-8 h-8 mb-3 text-slate-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/></svg>
                                <p class="mb-2 text-sm text-slate-500 font-semibold" id="file-name-display">Click to upload your PDF</p>
                                <p class="text-xs text-slate-400">PDF documents only</p>
                            </div>
                            <input id="pdf-upload" type="file" name="pdf_file" accept="application/pdf" class="hidden" required onchange="updateFileName(this)" />
                        </label>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full bg-emerald-500 text-white font-black py-4 rounded-xl hover:bg-emerald-600 transition-all shadow-xl hover:shadow-emerald-500/40 flex items-center justify-center gap-3 text-lg tracking-tight">
                        <span id="btn-text">Generate Canvas via Vertex AI</span>
                        <svg id="btn-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        <div id="btn-spinner" class="loader hidden"></div>
                    </button>
                </div>
            </div>
        </form>

    </div>

    <script>
        function handleMainCatChange() {
            const cat = document.querySelector('input[name="mainCat"]:checked').value;
            const subtypeSection = document.getElementById('subtype-section');
            const uploadSection = document.getElementById('upload-section');
            const hiddenInput = document.getElementById('hidden-doc-type');
            const stepNumber = document.getElementById('step-number');

            if (cat === 'procedure') {
                subtypeSection.classList.remove('hidden');
                uploadSection.classList.add('hidden');
                document.querySelectorAll('input[name="subType"]').forEach(el => el.checked = false);
                hiddenInput.value = ""; // Reset until subtype is chosen
                stepNumber.innerText = "3";
            } else {
                subtypeSection.classList.add('hidden');
                uploadSection.classList.remove('hidden');
                hiddenInput.value = cat; // 'method' or 'manual'
                stepNumber.innerText = "2"; // Because subtype is skipped
            }
        }

        function handleSubTypeChange(type) {
            const uploadSection = document.getElementById('upload-section');
            const hiddenInput = document.getElementById('hidden-doc-type');
            
            uploadSection.classList.remove('hidden');
            hiddenInput.value = type; // 'operational' or 'framework'
        }

        function updateFileName(input) {
            const display = document.getElementById('file-name-display');
            if (input.files && input.files[0]) {
                display.innerText = input.files[0].name;
                display.classList.add("text-[#00205B]");
            } else {
                display.innerText = "Click to upload your PDF";
                display.classList.remove("text-[#00205B]");
            }
        }

        function showLoadingState() {
            const btn = document.getElementById('submit-btn');
            const text = document.getElementById('btn-text');
            const icon = document.getElementById('btn-icon');
            const spinner = document.getElementById('btn-spinner');

            // Disable button to prevent double-submit
            btn.classList.replace('bg-emerald-500', 'bg-slate-400');
            btn.classList.replace('hover:bg-emerald-600', 'hover:bg-slate-400');
            btn.style.pointerEvents = "none";
            
            text.innerText = "Analyzing PDF with Gemini... Please wait";
            icon.classList.add('hidden');
            spinner.classList.remove('hidden');
        }
    </script>
</body>
</html>
